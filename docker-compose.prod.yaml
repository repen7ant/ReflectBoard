x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: mysql:8.0
    container_name: reflectboard-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:13306:3306"
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-conf:/etc/mysql/conf.d:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u${MYSQL_USER}",
          "-p${MYSQL_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: reflectboard-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning --maxmemory 96mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging: *default-logging

  fastapi:
    image: ghcr.io/${GHCR_OWNER}/reflectboard-fastapi:latest
    container_name: reflectboard-fastapi
    restart: always
    expose:
      - "8000"
    env_file: ./fastapi/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '1.0'
    logging: *default-logging

  laravel:
    image: ghcr.io/${GHCR_OWNER}/reflectboard-laravel:latest
    container_name: reflectboard-laravel
    restart: always
    expose:
      - "9000"
    volumes:
      - laravel_public:/nginx_public
    env_file: ./laravel/.env
    command: >
      sh -c "cp -a /var/www/html/public/. /nginx_public/ &&
             php artisan migrate --force &&
             php artisan config:cache &&
             php artisan route:cache &&
             php artisan view:cache &&
             chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache &&
             php-fpm"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '1.0'
    logging: *default-logging

  nginx:
    image: nginx:stable-alpine
    container_name: reflectboard-nginx
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - laravel_public:/var/www/html/public:ro
    depends_on:
      - fastapi
      - laravel
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.5'
    logging: *default-logging

volumes:
  mysql_data:
  redis_data:
  laravel_public:
