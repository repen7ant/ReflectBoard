services:
  db:
    image: mysql:8.0
    container_name: reflectboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-reflectboard}
      MYSQL_USER: ${MYSQL_USER:-reflectboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-reflectboard}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u${MYSQL_USER}",
          "-p${MYSQL_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reflectboard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi:
    build: ./fastapi
    container_name: reflectboard-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi:/app # hot-relaod
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./fastapi/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  laravel:
    build: ./laravel
    container_name: reflectboard-laravel
    restart: unless-stopped
    volumes:
      - ./laravel:/var/www/html
    command: sh -c "chown -R www-data:www-data storage bootstrap/cache && chmod -R 775 storage bootstrap/cache && php-fpm"
    env_file: ./laravel/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    container_name: reflectboard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./laravel/public:/var/www/html/public:ro
    depends_on:
      - fastapi
      - laravel

  # docker compose run --rm migrate (только вручную)
  migrate:
    build: ./fastapi
    env_file: ./fastapi/.env
    command: uv run alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  mysql_data:
  redis_data:
