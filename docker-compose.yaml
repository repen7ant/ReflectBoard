services:
  db:
    image: mysql:8.0
    container_name: reflectboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-reflectboard}
      MYSQL_USER: ${MYSQL_USER:-reflectboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-reflectboard}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u${MYSQL_USER:-reflectboard}",
          "-p${MYSQL_PASSWORD:-reflectboard}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reflectboard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ./fastapi
      target: development
    container_name: reflectboard-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi:/app # hot-reload
    env_file: ./fastapi/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  laravel:
    build:
      context: ./laravel
      target: development
    container_name: reflectboard-laravel
    restart: unless-stopped
    volumes:
      - ./laravel:/var/www/html # hot-reload
    command: >
      sh -c "composer install --no-interaction &&
             php artisan migrate --force &&
             chown -R www-data:www-data storage bootstrap/cache &&
             php-fpm"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  node:
    image: node:20-alpine
    container_name: reflectboard-node
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - laravel

  # bot:
  #   build:
  #     context: ./bot
  #   container_name: reflectboard-bot
  #   restart: unless-stopped
  #   network_mode: host
  #   volumes:
  #     - ./bot:/app

  nginx:
    image: nginx:stable-alpine
    container_name: reflectboard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./laravel/public:/var/www/html/public:ro
    depends_on:
      - fastapi
      - laravel

volumes:
  mysql_data:
  redis_data:
